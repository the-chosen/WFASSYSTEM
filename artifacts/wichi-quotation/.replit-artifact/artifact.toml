kind = "web"
previewPath = "/"
title = "Wichi Farms Quotation System"
version = "1.0.0"
id = "artifacts/wichi-quotation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25791

[services.development]
run = "pnpm --filter @workspace/wichi-quotation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wichi-quotation", "run", "build" ]
publicDir = "artifacts/wichi-quotation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25791"
BASE_PATH = "/"
