openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quotations
    description: Quotation management
  - name: inventory
    description: Inventory / product catalogue
  - name: leads
    description: Sales leads and follow-ups
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /quotations:
    get:
      operationId: listQuotations
      tags: [quotations]
      summary: List all saved quotations
      responses:
        "200":
          description: List of quotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuotationSummary"
    post:
      operationId: createQuotation
      tags: [quotations]
      summary: Save a new quotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationPayload"
      responses:
        "201":
          description: Created quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quotations/{id}:
    get:
      operationId: getQuotation
      tags: [quotations]
      summary: Get a single quotation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotation record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateQuotation
      tags: [quotations]
      summary: Update an existing quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationPayload"
      responses:
        "200":
          description: Updated quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteQuotation
      tags: [quotations]
      summary: Delete a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory:
    get:
      operationId: listInventoryItems
      tags: [inventory]
      summary: List all inventory items
      parameters:
        - name: activeOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItemRecord"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create a new inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemPayload"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory/{id}:
    get:
      operationId: getInventoryItem
      tags: [inventory]
      summary: Get an inventory item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemPayload"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadRecord"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadPayload"
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadPayload"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/follow-ups:
    get:
      operationId: listFollowUps
      tags: [leads]
      summary: List follow-ups for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUpRecord"
    post:
      operationId: createFollowUp
      tags: [leads]
      summary: Schedule a follow-up for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpPayload"
      responses:
        "201":
          description: Created follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/follow-ups/{fid}:
    put:
      operationId: updateFollowUp
      tags: [leads]
      summary: Update a follow-up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: fid
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpPayload"
      responses:
        "200":
          description: Updated follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUpRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteFollowUp
      tags: [leads]
      summary: Delete a follow-up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: fid
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LineItem:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
      required: [id, description, quantity, unitPrice]

    QuotationPayload:
      type: object
      properties:
        documentType:
          type: string
          enum: [quotation, invoice, receipt, delivery_note, sale_order]
        quotationNumber:
          type: string
        date:
          type: string
        validUntil:
          type: string
        clientName:
          type: string
        companyName:
          type: string
        address:
          type: string
        email:
          type: string
        phone:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
        discountType:
          type: string
          enum: [fixed, percentage]
        discountValue:
          type: number
        applyTax:
          type: boolean
        notes:
          type: string
        preparedBy:
          type: string
        signatureImage:
          type: string
      required:
        - quotationNumber
        - date
        - validUntil
        - clientName
        - items
        - discountType
        - discountValue
        - applyTax

    QuotationRecord:
      allOf:
        - $ref: "#/components/schemas/QuotationPayload"
        - type: object
          properties:
            id:
              type: integer
            createdAt:
              type: string
            updatedAt:
              type: string
          required: [id, createdAt, updatedAt]

    QuotationSummary:
      type: object
      properties:
        id:
          type: integer
        documentType:
          type: string
        quotationNumber:
          type: string
        clientName:
          type: string
        companyName:
          type: string
        date:
          type: string
        validUntil:
          type: string
        createdAt:
          type: string
      required: [id, quotationNumber, clientName, date, createdAt]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    InventoryItemPayload:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        unit:
          type: string
        unitPrice:
          type: number
        isActive:
          type: boolean
      required: [name, unitPrice]

    InventoryItemRecord:
      allOf:
        - $ref: "#/components/schemas/InventoryItemPayload"
        - type: object
          properties:
            id:
              type: integer
            createdAt:
              type: string
            updatedAt:
              type: string
          required: [id, createdAt, updatedAt]

    LeadPayload:
      type: object
      properties:
        clientName:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        productInterest:
          type: string
        status:
          type: string
          enum: [new, contacted, qualified, lost]
        notes:
          type: string
      required: [clientName]

    LeadRecord:
      allOf:
        - $ref: "#/components/schemas/LeadPayload"
        - type: object
          properties:
            id:
              type: integer
            createdAt:
              type: string
            updatedAt:
              type: string
          required: [id, createdAt, updatedAt]

    FollowUpPayload:
      type: object
      properties:
        leadId:
          type: integer
        scheduledDate:
          type: string
        notes:
          type: string
        status:
          type: string
          enum: [pending, done, cancelled]
      required: [leadId, scheduledDate]

    FollowUpRecord:
      allOf:
        - $ref: "#/components/schemas/FollowUpPayload"
        - type: object
          properties:
            id:
              type: integer
            createdAt:
              type: string
          required: [id, createdAt]
