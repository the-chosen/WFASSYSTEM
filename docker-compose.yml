version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agro-quote-postgres
    environment:
      POSTGRES_USER: agro_user
      POSTGRES_PASSWORD: agro_password
      POSTGRES_DB: agro_quote_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agro_user -d agro_quote_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agro-quote-api
    environment:
      DATABASE_URL: postgresql://agro_user:agro_password@postgres:5432/agro_quote_system
      SESSION_SECRET: ${SESSION_SECRET:-wichi-farms-secret-change-in-prod}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./artifacts/api-server/src:/app/artifacts/api-server/src
      - ./lib/db/src:/app/lib/db/src

  # Frontend (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agro-quote-frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "8080:8080"
    depends_on:
      - api-server
    volumes:
      - ./artifacts/wichi-quotation/src:/app/artifacts/wichi-quotation/src

volumes:
  postgres_data:
